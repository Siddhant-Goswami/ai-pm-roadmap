<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Find your current AI-native PM starting point and get a personalized 7-day build roadmap." />
  <title>The Applied AI Roadmap for PMs</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23F96846'/><text x='50' y='69' font-size='54' font-family='Arial' font-weight='700' text-anchor='middle' fill='%231A1A1A'>AI</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <aside id="sidebar" aria-label="Roadmap navigation">
    <div class="brand">
      <button class="brand-logo" id="homeLink" type="button" aria-label="Go to the beginning">
        <span>100</span><span class="brand-x">x</span>
      </button>
      <span class="brand-name">AI PM Roadmap</span>
    </div>
    <div class="side-intro">
      <span class="eyebrow">Live diagnostic</span>
      <p>Answer honestly. There are no “correct” profiles.</p>
    </div>
    <nav id="moduleNav"></nav>
    <div class="sidebar-foot">
      <button id="resetBtn" class="btn btn--ghost btn--sm" type="button">
        <span aria-hidden="true">↺</span> Reset answers
      </button>
    </div>
  </aside>

  <main id="main">
    <header class="topbar">
      <button id="menuBtn" class="icon-button only-mobile" type="button" aria-label="Open navigation" aria-controls="sidebar" aria-expanded="false">☰</button>
      <div class="topbar-progress" id="progressBar" role="progressbar" aria-label="Diagnostic progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
        <div id="progressFill"></div>
      </div>
      <span id="progressLabel" class="caption mono"></span>
    </header>

    <div id="stage" tabindex="-1"></div>

    <footer id="stepFooter" class="step-footer">
      <button id="backBtn" class="btn btn--secondary btn--sm" type="button">← Back</button>
      <div id="stepDots" class="step-dots" aria-hidden="true"></div>
      <button id="continueBtn" class="btn btn--primary" type="button">Continue →</button>
    </footer>
  </main>

  <button id="scrim" class="scrim" type="button" aria-label="Close navigation"></button>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
